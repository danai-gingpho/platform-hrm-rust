syntax = "proto3";

package auth;

service AuthService {
  // Realm/Tenant Management
  rpc CreateRealm (CreateRealmRequest) returns (CreateRealmResponse);
  
  // User Management
  rpc CreateUser (CreateUserRequest) returns (UserResponse);
  
  // RBAC Management
  rpc CreateRole (CreateRoleRequest) returns (RoleResponse);
  rpc CreatePermission (CreatePermissionRequest) returns (PermissionResponse);
  rpc AssignRoleToUser (AssignRoleRequest) returns (AssignRoleResponse);
  rpc AssignPermissionToRole (AssignPermissionRequest) returns (AssignPermissionResponse);
}

message CreateRealmRequest {
  string realm_name = 1;
}

message CreateRealmResponse {
  bool success = 1;
}

message CreateUserRequest {
  string email = 1;
  string first_name = 2;
  string last_name = 3;
  string realm = 4;
}

message UserResponse {
  string id = 1;
  string email = 2;
  string keycloak_id = 3;
}

message CreateRoleRequest {
  string name = 1;
  string description = 2;
}

message RoleResponse {
  string id = 1;
  string name = 2;
}

message CreatePermissionRequest {
  string name = 1;
  string code = 2;
}

message PermissionResponse {
  string id = 1;
  string name = 2;
  string code = 3;
}

message AssignRoleRequest {
  string user_id = 1;
  string role_id = 2;
}

message AssignRoleResponse {
  bool success = 1;
}

message AssignPermissionRequest {
  string role_id = 1;
  string permission_id = 2;
}

message AssignPermissionResponse {
  bool success = 1;
}
